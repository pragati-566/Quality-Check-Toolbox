<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Live Dashboard</title>
    <meta http-equiv="refresh" content="10"> <!-- Auto refresh every 10s -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f111a;
            --surface: rgba(30, 33, 43, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f2f6;
            --text-muted: #a4b0be;
            --accent: #3742fa;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(55, 66, 250, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(46, 213, 115, 0.08), transparent 25%);
        }
        .header {
            max-width: 1200px;
            margin: 0 auto 2rem;
            text-align: center;
        }
        .header h1 { margin: 0; font-weight: 800; font-size: 2.5rem; letter-spacing: -1px; }
        .header p { color: var(--text-muted); margin-top: 0.5rem; }
        
        .progress-container {
            max-width: 600px;
            margin: 2rem auto;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3742fa, #5352ed);
            width: 100%;
            transition: width 0.5s ease;
        }
        .progress-text {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 2rem;
            max-width: 1800px;
            margin: 0 auto;
        }
        .card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-4px); }
        
        .plots-grid {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--border);
        }
        .main-image-row {
            display: flex;
            flex-direction: row;
        }
        .main-image-row img {
            width: 50%;
            height: auto;
            object-fit: contain;
        }
        .sub-plots {
            display: flex;
            flex-direction: row;
            background: #1e212b;
            border-top: 1px solid var(--border);
        }
        .sub-plots img { width: 50%; height: auto; object-fit: contain; }
        
        .card-content { padding: 1.5rem; }
        .card-content h3 { margin: 0 0 0.5rem 0; font-size: 1.2rem; }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        .metrics p { margin: 0; }
        .metrics strong { color: var(--text-main); }
        
        .flags {
            font-size: 0.8rem;
            color: #ff4757;
            margin: 0;
            padding: 0.75rem;
            background: rgba(255, 71, 87, 0.1);
            border-radius: 8px;
            border: 1px dashed rgba(255, 71, 87, 0.3);
        }
        .loader {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
