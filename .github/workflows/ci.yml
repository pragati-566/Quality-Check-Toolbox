name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  pipeline:
    name: QC Pipeline (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    # Allow pushing live QC UI to gh-pages branch
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8 (warnings only — non-blocking)
        run: |
          flake8 qc_toolbox/ --max-line-length=100 --exit-zero \
            --format="::warning file=%(path)s,line=%(row)d,col=%(col)d::%(code)s %(text)s"

      # ── Sparse-checkout: download ONLY the rawdata subfolder (~few MB) ──
      - name: Download ExploreASL TestDataSet (rawdata only)
        run: |
          mkdir -p data/ExploreASL
          cd data/ExploreASL
          git init
          git remote add origin https://github.com/ExploreASL/ExploreASL.git
          git sparse-checkout init --cone
          git sparse-checkout set External/TestDataSet/rawdata
          git pull --depth=1 origin main
          echo "Downloaded files:"
          find External/TestDataSet/rawdata -type f | head -40

      - name: Setup Live UI Worktree (Python 3.11 only)
        if: matrix.python-version == '3.11'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git worktree add gh-pages-worktree origin/gh-pages
          else
            git worktree add gh-pages-worktree --detach
            git -C gh-pages-worktree checkout --orphan gh-pages
            git -C gh-pages-worktree rm -rf --ignore-unmatch .
          fi

      - name: Run full QC pipeline on TestDataSet
        env:
          LIVE_HTML_WORKTREE_DIR: ${{ matrix.python-version == '3.11' && 'gh-pages-worktree' || '' }}
        run: |
          python run_pipeline.py run \
            --bids data/ExploreASL/External/TestDataSet/rawdata \
            --output qc_output \
            --no-plots

      - name: Verify output CSV was created
        run: |
          if [ ! -f qc_output/qc_results.csv ]; then
            echo "ERROR: qc_results.csv was not produced!"
            exit 1
          fi
          echo "=== QC Results ==="
          cat qc_output/qc_results.csv

      - name: Upload QC output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: qc-output-py${{ matrix.python-version }}
          path: qc_output/
          retention-days: 14
          if-no-files-found: error
